<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>推しジャーニー公式ページ</title>
  <style>
    :root {
      --ink: #171b4f;
      --muted: #6f6a78;
      --pink: #e7789b;
      --soft-pink: #fff1f6;
      --honey: #f7c95f;
      --blue: #a8d4f2;
      --line: rgba(231, 120, 155, 0.25);
      --card: rgba(255, 255, 255, 0.82);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 12%, #ffe7f0 0, transparent 28%),
        radial-gradient(circle at 85% 18%, #fff4cf 0, transparent 24%),
        linear-gradient(180deg, #fff7fb 0%, #fffdf6 55%, #f7fffb 100%);
      min-height: 100vh;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 40px;
    }

    .hero {
      text-align: center;
      padding: 36px 22px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(231, 120, 155, 0.14);
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 14px;
      border-radius: 999px;
      color: var(--pink);
      background: #fff;
      border: 1px dashed rgba(231, 120, 155, 0.45);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.9;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    a.card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 17px 18px;
      border-radius: 18px;
      color: var(--ink);
      text-decoration: none;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(23, 27, 79, 0.06);
      font-weight: 700;
    }

    a.card:hover {
      transform: translateY(-1px);
      border-color: rgba(231, 120, 155, 0.55);
    }

    .arrow {
      color: var(--pink);
      font-size: 20px;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="badge">OSHI JOURNEY</div>
      <h1>推しジャーニー<br>公式ページ</h1>
      <p class="lead">
        推し活の思い出を、日記・イベント・感情・お金・予定と一緒に残せる記録アプリです。
      </p>

      <div class="links">
        <a class="card" href="https://apps.apple.com/app/id6771171313">
          <span>App Store</span><span class="arrow">›</span>
        </a>
        <a class="card" href="https://oshi-journey-support.notion.site/365b4608624a802eb0bec2c1da6c58c0">
          <span>サポート</span><span class="arrow">›</span>
        </a>
        <a class="card" href="https://oshi-journey-support.notion.site/365b4608624a80c6ac6edb82be366884">
          <span>プライバシーポリシー</span><span class="arrow">›</span>
        </a>
        <a class="card" href="https://oshi-journey-support.notion.site/365b4608624a80afadeaff86cb3ea217">
          <span>利用規約</span><span class="arrow">›</span>
        </a>
      </div>
    </section>

    <footer>
      © Kenty / 推しジャーニー
    </footer>
  </main>
</body>
</html>
