<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kenty Apps</title>
  <style>
    :root {
      --ink: #171b4f;
      --muted: #6f6a78;
      --pink: #e7789b;
      --line: rgba(23, 27, 79, 0.12);
      --card: rgba(255, 255, 255, 0.86);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 8%, #ffe8f1 0, transparent 28%),
        radial-gradient(circle at 88% 18%, #fff1c8 0, transparent 24%),
        linear-gradient(180deg, #fff9fc 0%, #fffdf8 60%, #f8fffb 100%);
      min-height: 100vh;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    header {
      margin-bottom: 28px;
    }

    .eyebrow {
      color: var(--pink);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.2;
    }

    .lead {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
      margin-top: 12px;
      max-width: 620px;
    }

    .apps {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(23, 27, 79, 0.08);
      text-decoration: none;
      color: var(--ink);
    }

    .app-card img {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      flex: 0 0 auto;
    }

    .app-card strong {
      display: block;
      font-size: 19px;
      margin-bottom: 4px;
    }

    .app-card span {
      display: block;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .arrow {
      margin-left: auto;
      color: var(--pink);
      font-size: 26px;
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="eyebrow">KENTY APPS</div>
      <h1>Kenty Apps</h1>
      <p class="lead">
        個人開発アプリの公式ページです。各アプリのサポート、プライバシーポリシー、利用規約はこちらから確認できます。
      </p>
    </header>

    <section class="apps">
      <a class="app-card" href="./oshi-journey/">
        <img src="./AppIcon.png" alt="推しジャーニー">
        <div>
          <strong>推しジャーニー</strong>
          <span>推し活の思い出をまとめて残せる記録アプリ</span>
        </div>
        <div class="arrow">›</div>
      </a>
    </section>

    <footer>
      © Kenty
    </footer>
  </main>
</body>
</html>
